<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Sync Watch Room</title>
<style>
  :root{
    --bg:#0a1128; --panel:#0d1730; --neon:#00d9ff; --neon2:#2979ff;
    --text:#eaf6ff; --muted:#7fa8c9; --danger:#ff3b6b;
  }
  body.theme-purple{
    --bg:#160a28; --panel:#1c0f36; --neon:#c14dff; --neon2:#8a2be2; --text:#f3e8ff; --muted:#b892e0;
  }
  body.theme-orange{
    --bg:#1c0d02; --panel:#241206; --neon:#ff8a00; --neon2:#ff5200; --text:#ffe9d2; --muted:#e0a06f;
  }
  body.theme-black{
    --bg:#000000; --panel:#0c0c0c; --neon:#e0e0e0; --neon2:#8f8f8f; --text:#ffffff; --muted:#9a9a9a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%; margin:0; overflow:hidden;}
  body{
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    transition:background .3s;
  }
  button{font-family:inherit; cursor:pointer; border:none; outline:none;}
  input{font-family:inherit;}
  .neon-border{border:1px solid var(--neon); box-shadow:0 0 8px var(--neon), 0 0 18px var(--neon2), inset 0 0 8px rgba(0,0,0,.4);}
  .neon-text{color:var(--neon); text-shadow:0 0 6px var(--neon), 0 0 14px var(--neon2);}
  .neon-btn{
    background:var(--panel); color:var(--text); border-radius:10px; padding:10px 14px;
    border:1px solid var(--neon); box-shadow:0 0 6px var(--neon2); font-weight:600;
  }
  .neon-btn:active{ box-shadow:0 0 16px var(--neon), 0 0 30px var(--neon2); }
  .hidden{display:none !important;}

  /* ---------- LOGIN ---------- */
  #login{
    height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:16px; padding:24px;
  }
  #login h1{ font-size:22px; letter-spacing:1px; margin-bottom:6px; }
  #login input{
    width:100%; max-width:320px; padding:12px 14px; border-radius:10px; background:var(--panel);
    color:var(--text); border:1px solid var(--neon2); font-size:16px;
  }
  .login-card{ width:100%; max-width:340px; background:var(--panel); border-radius:16px; padding:18px;
    box-shadow:0 0 20px var(--neon2); display:flex; flex-direction:column; gap:10px; }
  .login-card h2{ margin:0 0 4px; font-size:15px; color:var(--muted); }

  /* ---------- ROOM LAYOUT (split screen) ---------- */
  #room{ height:100%; display:flex; flex-direction:column; }
  #topbar{
    display:flex; align-items:center; justify-content:space-between; padding:8px 12px;
    background:var(--panel); border-bottom:1px solid var(--neon2); flex:0 0 auto;
  }
  #topbar .room-code{ font-size:13px; color:var(--muted); }
  #topbar .icon-btn{
    background:transparent; color:var(--neon); font-size:20px; padding:4px 8px; border-radius:8px;
  }

  #videoWrap{
    flex:0 0 46%; position:relative; background:#000; overflow:hidden;
  }
  #videoWrap video{ width:100%; height:100%; object-fit:contain; background:#000; }
  #pickOverlay{
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:12px; background:rgba(0,0,0,.7); text-align:center; padding:16px;
  }
  #pickOverlay p{ font-size:13px; color:var(--muted); max-width:260px; }

  .videoControls{
    position:absolute; left:0; right:0; bottom:0; display:flex; flex-direction:column; gap:6px;
    padding:6px 8px 8px; background:linear-gradient(transparent, rgba(0,0,0,.75));
  }
  .seekRow{ display:flex; align-items:center; gap:8px; }
  .seekRow input[type=range]{ flex:1; accent-color:var(--neon); }
  .timeLbl{ font-size:11px; color:var(--muted); min-width:76px; text-align:center; }
  .btnRow{ display:flex; align-items:center; justify-content:center; gap:14px; }
  .ctrlBtn{
    background:rgba(10,10,20,.6); color:var(--neon); border:1px solid var(--neon);
    border-radius:50%; width:42px; height:42px; font-size:16px; display:flex; align-items:center; justify-content:center;
    box-shadow:0 0 8px var(--neon2);
  }
  .fsBtn{
    position:absolute; top:8px; right:8px; background:rgba(10,10,20,.7); color:var(--neon);
    border:1px solid var(--neon); border-radius:8px; padding:6px 10px; font-size:13px;
  }
  .guestNote{
    position:absolute; top:8px; left:8px; font-size:11px; color:var(--muted); background:rgba(0,0,0,.5);
    padding:4px 8px; border-radius:6px;
  }

  /* ---------- CHAT ---------- */
  #chatWrap{ flex:1 1 auto; display:flex; flex-direction:column; min-height:0; background:var(--bg); }
  #chatMessages{ flex:1; overflow-y:auto; padding:10px 12px; display:flex; flex-direction:column; gap:8px; }
  .msg{ font-size:14px; line-height:1.35; max-width:88%; }
  .msg .who{ font-size:11px; color:var(--neon); margin-right:6px; }
  .msg.system{ color:var(--muted); font-size:12px; text-align:center; max-width:100%; }
  .msg.mine{ align-self:flex-end; text-align:right; }
  #chatInputRow{
    display:flex; gap:8px; padding:8px; border-top:1px solid var(--neon2); background:var(--panel); flex:0 0 auto;
  }
  #chatInputRow input{
    flex:1; padding:10px 12px; border-radius:20px; background:var(--bg); color:var(--text);
    border:1px solid var(--neon2); font-size:14px;
  }
  #chatInputRow button{
    border-radius:20px; padding:0 16px; background:var(--neon2); color:#000; font-weight:700;
  }

  /* ---------- SETTINGS PANEL ---------- */
  #settingsOverlay{
    position:fixed; inset:0; background:rgba(0,0,0,.6); display:flex; align-items:flex-end; z-index:50;
  }
  #settingsPanel{
    width:100%; max-height:80%; background:var(--panel); border-radius:18px 18px 0 0; padding:16px;
    box-shadow:0 0 30px var(--neon2); overflow-y:auto;
  }
  #settingsPanel h3{ margin:14px 0 8px; font-size:14px; color:var(--muted); }
  #settingsPanel h3:first-child{ margin-top:0; }
  .themeRow{ display:flex; gap:10px; flex-wrap:wrap; }
  .themeSwatch{
    width:64px; height:64px; border-radius:12px; display:flex; align-items:center; justify-content:center;
    font-size:10px; text-align:center; border:2px solid transparent; color:#fff;
  }
  .themeSwatch.active{ border-color:#fff; }
  .swatch-blue{ background:#0a1128; box-shadow:0 0 12px #00d9ff; }
  .swatch-purple{ background:#160a28; box-shadow:0 0 12px #c14dff; }
  .swatch-orange{ background:#1c0d02; box-shadow:0 0 12px #ff8a00; }
  .swatch-black{ background:#000; box-shadow:0 0 12px #e0e0e0; }
  .participantRow{
    display:flex; align-items:center; justify-content:space-between; padding:8px 0;
    border-bottom:1px solid rgba(255,255,255,.06);
  }
  .participantRow .pname{ font-size:14px; }
  .participantRow .kickBtn{
    background:transparent; color:var(--danger); border:1px solid var(--danger); border-radius:8px;
    padding:4px 10px; font-size:12px;
  }
  #closeRoomBtn{
    width:100%; margin-top:16px; background:var(--danger); color:#fff; padding:12px; border-radius:10px;
    font-weight:700; box-shadow:0 0 14px var(--danger);
  }
  #closeSettingsBtn{
    width:100%; margin-top:10px; background:transparent; color:var(--muted); padding:10px; border:1px solid var(--muted); border-radius:10px;
  }

  /* ---------- FULLSCREEN ---------- */
  #videoWrap:fullscreen{ background:#000; }
  #videoWrap:fullscreen video{ height:100%; }

  #starBtn{
    position:absolute; bottom:70px; right:16px; z-index:20; display:none;
    background:var(--panel); border:1px solid var(--neon); border-radius:24px;
    padding:8px 12px; align-items:center; gap:6px; box-shadow:0 0 14px var(--neon2);
    color:var(--text); font-size:12px; font-weight:600;
  }
  #videoWrap:fullscreen #starBtn{ display:flex; }
  #starBtn .starIcon{ color:var(--neon); font-size:16px; text-shadow:0 0 8px var(--neon); }

  #miniChat{
    position:absolute; bottom:112px; right:12px; width:78%; max-width:320px; height:46%;
    background:rgba(8,10,20,.9); border:1px solid var(--neon); border-radius:14px; z-index:21;
    display:none; flex-direction:column; box-shadow:0 0 20px var(--neon2); overflow:hidden;
  }
  #miniChat.open{ display:flex; }
  #miniChatMsgs{ flex:1; overflow-y:auto; padding:8px 10px; display:flex; flex-direction:column; gap:6px; }
  #miniChatMsgs .msg{ font-size:12.5px; }
  #miniChatInputRow{ display:flex; gap:6px; padding:6px; border-top:1px solid var(--neon2); }
  #miniChatInputRow input{
    flex:1; padding:8px 10px; border-radius:16px; background:var(--bg); color:var(--text);
    border:1px solid var(--neon2); font-size:13px;
  }
  #miniChatInputRow button{ border-radius:16px; padding:0 12px; background:var(--neon2); color:#000; font-weight:700; font-size:13px; }

  .toast{
    position:fixed; top:14px; left:50%; transform:translateX(-50%); background:var(--panel); color:var(--text);
    border:1px solid var(--neon); border-radius:10px; padding:8px 14px; font-size:13px; z-index:99;
    box-shadow:0 0 14px var(--neon2);
  }
</style>
</head>
<body>

<!-- ===================== LOGIN SCREEN ===================== -->
<div id="login">
  <h1 class="neon-text">🎬 SYNC WATCH ROOM</h1>
  <div class="login-card neon-border">
    <h2>Your name</h2>
    <input id="nameInput" type="text" placeholder="Enter your name" maxlength="20">
  </div>
  <div class="login-card neon-border">
    <h2>Host a new room</h2>
    <button class="neon-btn" id="createRoomBtn">Create Room</button>
  </div>
  <div class="login-card neon-border">
    <h2>Join an existing room</h2>
    <input id="roomCodeInput" type="text" placeholder="Room code" maxlength="6" style="text-transform:uppercase">
    <button class="neon-btn" id="joinRoomBtn">Join Room</button>
  </div>
</div>

<!-- ===================== ROOM SCREEN ===================== -->
<div id="room" class="hidden">
  <div id="topbar">
    <div class="room-code">Room: <span id="roomCodeLabel" class="neon-text"></span> · <span id="roleLabel"></span></div>
    <button class="icon-btn" id="settingsBtn">⚙️</button>
  </div>

  <!-- TOP HALF: VIDEO -->
  <div id="videoWrap">
    <video id="video" playsinline webkit-playsinline></video>

    <div id="pickOverlay">
      <p id="pickOverlayText">Load a video file from your phone to begin.</p>
      <input type="file" id="fileInput" accept="video/*">
    </div>

    <button class="fsBtn" id="fsToggleBtn">⛶ Fullscreen</button>
    <div class="guestNote hidden" id="guestNote">Host controls playback</div>

    <div class="videoControls" id="videoControls" style="display:none">
      <div class="seekRow">
        <span class="timeLbl" id="curTime">0:00</span>
        <input type="range" id="seekBar" min="0" max="100" value="0" step="0.1">
        <span class="timeLbl" id="durTime">0:00</span>
      </div>
      <div class="btnRow">
        <button class="ctrlBtn" id="rewindBtn">⏪</button>
        <button class="ctrlBtn" id="playPauseBtn">▶️</button>
        <button class="ctrlBtn" id="forwardBtn">⏩</button>
      </div>
    </div>

    <!-- Floating star chat button (fullscreen only) -->
    <button id="starBtn"><span class="starIcon">⭐</span> Soz Y Tano (سۆزەی تەنۆ)</button>
    <div id="miniChat">
      <div id="miniChatMsgs"></div>
      <div id="miniChatInputRow">
        <input type="text" id="miniChatInput" placeholder="Message...">
        <button id="miniChatSendBtn">Send</button>
      </div>
    </div>
  </div>

  <!-- BOTTOM HALF: CHAT -->
  <div id="chatWrap">
    <div id="chatMessages"></div>
    <div id="chatInputRow">
      <input type="text" id="chatInput" placeholder="Type a message...">
      <button id="chatSendBtn">Send</button>
    </div>
  </div>
</div>

<!-- ===================== SETTINGS PANEL (host only) ===================== -->
<div id="settingsOverlay" class="hidden">
  <div id="settingsPanel">
    <h3>Theme</h3>
    <div class="themeRow">
      <div class="themeSwatch swatch-blue active" data-theme="theme-blue">Deep Blue</div>
      <div class="themeSwatch swatch-purple" data-theme="theme-purple">Deep Purple</div>
      <div class="themeSwatch swatch-orange" data-theme="theme-orange">Dark Orange</div>
      <div class="themeSwatch swatch-black" data-theme="theme-black">Jet Black</div>
    </div>

    <h3 id="participantsHeader">Participants</h3>
    <div id="participantsList"></div>

    <button id="closeRoomBtn" class="hidden">Close Room</button>
    <button id="closeSettingsBtn">Close</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
(function(){
  const socket = io();
  let isHost = false, roomId = null, myName = '', mySocketId = null;
  let suppressSync = false; // prevents feedback loop when applying remote sync

  // ---------- THEME ----------
  const savedTheme = localStorage.getItem('swTheme') || 'theme-blue';
  document.body.classList.add(savedTheme);
  document.querySelectorAll('.themeSwatch').forEach(el=>{
    if(el.dataset.theme === savedTheme) el.classList.add('active'); else el.classList.remove('active');
    el.addEventListener('click', ()=>{
      document.body.className = el.dataset.theme;
      localStorage.setItem('swTheme', el.dataset.theme);
      document.querySelectorAll('.themeSwatch').forEach(s=>s.classList.remove('active'));
      el.classList.add('active');
    });
  });

  // ---------- ELEMENTS ----------
  const loginEl = document.getElementById('login');
  const roomEl = document.getElementById('room');
  const nameInput = document.getElementById('nameInput');
  const roomCodeInput = document.getElementById('roomCodeInput');
  const video = document.getElementById('video');
  const fileInput = document.getElementById('fileInput');
  const pickOverlay = document.getElementById('pickOverlay');
  const pickOverlayText = document.getElementById('pickOverlayText');
  const videoControls = document.getElementById('videoControls');
  const guestNote = document.getElementById('guestNote');
  const seekBar = document.getElementById('seekBar');
  const curTime = document.getElementById('curTime');
  const durTime = document.getElementById('durTime');
  const playPauseBtn = document.getElementById('playPauseBtn');
  const chatMessages = document.getElementById('chatMessages');
  const chatInput = document.getElementById('chatInput');
  const miniChatMsgs = document.getElementById('miniChatMsgs');
  const miniChatInput = document.getElementById('miniChatInput');
  const settingsOverlay = document.getElementById('settingsOverlay');
  const participantsList = document.getElementById('participantsList');
  const closeRoomBtn = document.getElementById('closeRoomBtn');

  function fmt(s){
    if(!isFinite(s)) return '0:00';
    const m = Math.floor(s/60), sec = Math.floor(s%60);
    return m + ':' + String(sec).padStart(2,'0');
  }
  function toast(msg){
    const t = document.createElement('div');
    t.className = 'toast'; t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(()=>t.remove(), 2500);
  }

  // ---------- LOGIN ----------
  document.getElementById('createRoomBtn').addEventListener('click', ()=>{
    myName = nameInput.value.trim() || 'Host';
    socket.emit('create-room', { name: myName }, (res)=>{
      if(!res.ok) return toast('Failed to create room');
      enterRoom(res.roomId, true);
    });
  });
  document.getElementById('joinRoomBtn').addEventListener('click', ()=>{
    myName = nameInput.value.trim() || 'Guest';
    const code = roomCodeInput.value.trim().toUpperCase();
    if(!code) return toast('Enter a room code');
    socket.emit('join-room', { roomId: code, name: myName }, (res)=>{
      if(!res.ok) return toast(res.error || 'Could not join room');
      enterRoom(res.roomId, false);
    });
  });

  function enterRoom(id, hostFlag){
    roomId = id; isHost = hostFlag; mySocketId = socket.id;
    loginEl.classList.add('hidden');
    roomEl.classList.remove('hidden');
    document.getElementById('roomCodeLabel').textContent = roomId;
    document.getElementById('roleLabel').textContent = isHost ? 'Host' : 'Guest';
    if(isHost){
      videoControls.style.display = 'flex';
      guestNote.classList.add('hidden');
      pickOverlayText.textContent = 'Select the video file from your phone to start playback for everyone.';
    } else {
      videoControls.style.display = 'none';
      guestNote.classList.remove('hidden');
      pickOverlayText.textContent = 'Select the SAME video file on your phone to stay in sync with the host.';
      socket.emit('request-sync');
    }
  }

  // ---------- LOCAL FILE LOAD ----------
  fileInput.addEventListener('change', (e)=>{
    const f = e.target.files[0];
    if(!f) return;
    const url = URL.createObjectURL(f);
    video.src = url;
    pickOverlay.style.display = 'none';
    if(!isHost) socket.emit('request-sync');
  });

  // ---------- HOST CONTROLS ----------
  function hostEmit(type, time){
    if(!isHost) return;
    socket.emit('host-action', { type, time });
  }
  playPauseBtn.addEventListener('click', ()=>{
    if(!isHost) return;
    if(video.paused){ video.play(); } else { video.pause(); }
  });
  document.getElementById('rewindBtn').addEventListener('click', ()=>{
    if(!isHost) return;
    video.currentTime = Math.max(0, video.currentTime - 10);
    hostEmit('seek', video.currentTime);
  });
  document.getElementById('forwardBtn').addEventListener('click', ()=>{
    if(!isHost) return;
    video.currentTime = Math.min(video.duration||0, video.currentTime + 10);
    hostEmit('seek', video.currentTime);
  });
  video.addEventListener('play', ()=>{
    playPauseBtn.textContent = '⏸️';
    if(isHost && !suppressSync) hostEmit('play', video.currentTime);
  });
  video.addEventListener('pause', ()=>{
    playPauseBtn.textContent = '▶️';
    if(isHost && !suppressSync) hostEmit('pause', video.currentTime);
  });
  video.addEventListener('timeupdate', ()=>{
    if(video.duration){
      seekBar.value = (video.currentTime / video.duration) * 100;
      curTime.textContent = fmt(video.currentTime);
      durTime.textContent = fmt(video.duration);
    }
  });
  seekBar.addEventListener('change', ()=>{
    if(!isHost || !video.duration) return;
    const t = (seekBar.value/100) * video.duration;
    video.currentTime = t;
    hostEmit('seek', t);
  });

  // ---------- GUEST: RECEIVE SYNC ----------
  socket.on('sync', ({ type, time })=>{
    if(isHost) return;
    suppressSync = true;
    if(typeof time === 'number' && Math.abs(video.currentTime - time) > 1){
      video.currentTime = time;
    }
    if(type === 'play') video.play().catch(()=>{});
    if(type === 'pause') video.pause();
    setTimeout(()=>{ suppressSync = false; }, 150);
  });

  // ---------- FULLSCREEN ----------
  const videoWrap = document.getElementById('videoWrap');
  document.getElementById('fsToggleBtn').addEventListener('click', ()=>{
    if(!document.fullscreenElement){
      videoWrap.requestFullscreen().catch(()=>{});
    } else {
      document.exitFullscreen();
    }
  });
  document.addEventListener('fullscreenchange', ()=>{
    const btn = document.getElementById('fsToggleBtn');
    btn.textContent = document.fullscreenElement ? '⤢ Exit Fullscreen' : '⛶ Fullscreen';
  });

  // ---------- FLOATING STAR MINI-CHAT ----------
  const starBtn = document.getElementById('starBtn');
  const miniChat = document.getElementById('miniChat');
  starBtn.addEventListener('click', ()=> miniChat.classList.toggle('open'));

  function renderMsg(container, m){
    const div = document.createElement('div');
    if(m.system){
      div.className = 'msg system';
      div.textContent = m.text;
    } else {
      div.className = 'msg' + (m.name === myName ? ' mine' : '');
      div.innerHTML = '<span class="who">' + (m.isHost ? '👑 ' : '') + escapeHtml(m.name) + ':</span>' + escapeHtml(m.text);
    }
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }
  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  socket.on('chat-message', (m)=>{
    renderMsg(chatMessages, m);
    renderMsg(miniChatMsgs, m);
  });

  function sendChat(inputEl){
    const text = inputEl.value.trim();
    if(!text) return;
    socket.emit('chat-message', { text });
    inputEl.value = '';
  }
  document.getElementById('chatSendBtn').addEventListener('click', ()=>sendChat(chatInput));
  chatInput.addEventListener('keydown', e=>{ if(e.key==='Enter') sendChat(chatInput); });
  document.getElementById('miniChatSendBtn').addEventListener('click', ()=>sendChat(miniChatInput));
  miniChatInput.addEventListener('keydown', e=>{ if(e.key==='Enter') sendChat(miniChatInput); });

  // ---------- SETTINGS PANEL ----------
  document.getElementById('settingsBtn').addEventListener('click', ()=>{
    if(!isHost){
      toast('Only the host can open settings');
      return;
    }
    settingsOverlay.classList.remove('hidden');
    closeRoomBtn.classList.remove('hidden');
  });
  document.getElementById('closeSettingsBtn').addEventListener('click', ()=>{
    settingsOverlay.classList.add('hidden');
  });
  closeRoomBtn.addEventListener('click', ()=>{
    if(confirm('Close the room for everyone?')){
      socket.emit('close-room');
    }
  });

  socket.on('roster', (list)=>{
    participantsList.innerHTML = '';
    list.forEach(p=>{
      const row = document.createElement('div');
      row.className = 'participantRow';
      const nameSpan = document.createElement('span');
      nameSpan.className = 'pname';
      nameSpan.textContent = (p.isHost ? '👑 ' : '') + p.name + (p.id===mySocketId?' (you)':'');
      row.appendChild(nameSpan);
      if(isHost && !p.isHost){
        const kickBtn = document.createElement('button');
        kickBtn.className = 'kickBtn';
        kickBtn.textContent = 'Kick';
        kickBtn.addEventListener('click', ()=>{
          if(confirm('Remove ' + p.name + ' from the room?')) socket.emit('kick', { targetId: p.id });
        });
        row.appendChild(kickBtn);
      }
      participantsList.appendChild(row);
    });
  });

  socket.on('kicked', ()=>{
    alert('You have been removed from the room.');
    location.reload();
  });
  socket.on('room-closed', ()=>{
    alert('The room has been closed.');
    location.reload();
  });

})();
</script>
</body>
</html>
